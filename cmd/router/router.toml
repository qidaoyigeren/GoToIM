[discovery]
    nodes = ["127.0.0.1:7171"]
    env = "dev"
    region = "sh"
    zone = "sh001"

[grpc]
    network = "tcp"
    addr = ":7172"
    timeout = "1s"
    idleTimeout = "1m"
    maxLifeTime = "2h"
    forceCloseWait = "20s"
    keepAliveInterval = "1m"
    keepAliveTimeout = "20s"

[redis]
    network = "tcp"
    addr = "127.0.0.1:6379"
    active = 60000
    idle = 1024
    dialTimeout = "200ms"
    readTimeout = "500ms"
    writeTimeout = "500ms"
    idleTimeout = "120s"
    expire = "24h"

[kafka]
    topic = "goim-push-topic"
    brokers = ["127.0.0.1:9092"]
    pushTopic = "goim-push-topic"
    online_push_topic = "goim-online-push-topic"
    offline_push_topic = "goim-offline-push-topic"
    room_topic = "goim-room-topic"
    all_topic = "goim-all-topic"
    ack_topic = "goim-ack-topic"

[snowflake]
    machineID = 1

[limiter]
    rate = 10000
    burst = 20000
