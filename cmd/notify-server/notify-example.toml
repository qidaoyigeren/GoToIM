# goim Notify Server — Order Notification Platform
# Copy this file and adjust for your environment.

listen = ":3121"
logic_addr = "localhost:3111"

[storage]
# Create database `goim_notify` first.
driver = "mysql"
dsn = "goim:goim@tcp(127.0.0.1:3306)/goim_notify?charset=utf8mb4&parseTime=true&loc=Local"

[outbox]
enabled = true
batch_size = 100
poll_interval = "1s"
max_retries = 5
lock_ttl = "30s"

[simulation]
default_qps = 100
flash_sale_users = 10000
flash_sale_burst_ms = 2000
order_lifecycle_min = "3s"
order_lifecycle_max = "10s"
user_pool_size = 10000
