services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --save 60 1000 --appendfsync everysec
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - goim-net

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - goim-net

  discovery:
    build:
      context: .
      dockerfile: deploy/discovery.Dockerfile
    ports:
      - "7171:7171"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7171/discovery/fetch?env=dev&appid=infra.discovery"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - goim-net

  logic:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: logic
    hostname: logic
    ports:
      - "3111:3111"
      - "3119:3119"
    volumes:
      - ./deploy/configs/logic-docker.toml:/etc/goim/config.toml:ro
    command: ["-conf", "/etc/goim/config.toml", "-region=sh", "-zone=sh001", "-deploy.env=dev", "-weight=10"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3111/goim/online/total"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - goim-net

  comet:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: comet
    hostname: comet
    ports:
      - "3101:3101"
      - "3102:3102"
      - "3109:3109"
    volumes:
      - ./deploy/configs/comet-docker.toml:/etc/goim/config.toml:ro
    command: ["-conf", "/etc/goim/config.toml", "-region=sh", "-zone=sh001", "-deploy.env=dev", "-weight=10", "-addrs=comet"]
    depends_on:
      logic:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3102/ || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - goim-net

  job:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: job
    hostname: job
    volumes:
      - ./deploy/configs/job-docker.toml:/etc/goim/config.toml:ro
    command: ["-conf", "/etc/goim/config.toml", "-region=sh", "-zone=sh001", "-deploy.env=dev"]
    depends_on:
      logic:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - goim-net

  web-demo:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./examples/chat-demo:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - logic
    networks:
      - goim-net

volumes:
  redis-data:
    driver: local

networks:
  goim-net:
    driver: bridge
