name: goim

x-build-args: &build-args
  GO_VERSION: "1.25"
  ALPINE_VERSION: "3.22"

x-goim-env: &goim-env
  REGION: sh
  ZONE: sh001
  DEPLOY_ENV: dev
  WEIGHT: "10"

x-common-service: &common-service
  init: true
  restart: unless-stopped
  networks:
    - goim-net

services:
  redis:
    <<: *common-service
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
      - --appendfsync
      - everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  kafka:
    <<: *common-service
    image: bitnami/kafka:3.9
    ports:
      - "9092:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  discovery:
    <<: *common-service
    image: goim/discovery:dev
    build:
      context: .
      dockerfile: deploy/discovery.Dockerfile
      args:
        <<: *build-args
    ports:
      - "7171:7171"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://127.0.0.1:7171/discovery/fetch?env=dev&appid=infra.discovery' >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  logic:
    <<: *common-service
    image: goim/logic:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build-args
        SERVICE: logic
    hostname: logic
    environment:
      <<: *goim-env
    ports:
      - "3111:3111"
      - "3119:3119"
    volumes:
      - ./deploy/configs/logic-docker.toml:/etc/goim/config.toml:ro
    command: ["-conf", "/etc/goim/config.toml"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3111/goim/online/total >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    stop_grace_period: 30s

  comet:
    <<: *common-service
    image: goim/comet:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build-args
        SERVICE: comet
    hostname: comet
    environment:
      <<: *goim-env
      ADDRS: comet
      DEBUG: "true"
    ports:
      - "3101:3101"
      - "3102:3102"
      - "3109:3109"
    volumes:
      - ./deploy/configs/comet-docker.toml:/etc/goim/config.toml:ro
    command: ["-conf", "/etc/goim/config.toml"]
    depends_on:
      logic:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3101 && nc -z 127.0.0.1 3102 && nc -z 127.0.0.1 3109"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    stop_grace_period: 45s

  job:
    <<: *common-service
    image: goim/job:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        <<: *build-args
        SERVICE: job
    hostname: job
    environment:
      REGION: sh
      ZONE: sh001
      DEPLOY_ENV: dev
    volumes:
      - ./deploy/configs/job-docker.toml:/etc/goim/config.toml:ro
    command: ["-conf", "/etc/goim/config.toml"]
    depends_on:
      kafka:
        condition: service_healthy
      discovery:
        condition: service_healthy
      comet:
        condition: service_healthy
    stop_grace_period: 30s

  web-demo:
    <<: *common-service
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./examples/chat-demo:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      logic:
        condition: service_healthy
      comet:
        condition: service_healthy

volumes:
  redis-data:
  kafka-data:

networks:
  goim-net:
    driver: bridge
