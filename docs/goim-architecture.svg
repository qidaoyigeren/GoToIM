<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">goim four-layer reliable messaging architecture</title>
  <desc id="desc">Architecture diagram showing Business, Logic, Router, Redis, Kafka, Worker, Comet, Client, fast path, reliable path and ACK feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="logic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="router" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="infra" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="worker" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="comet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 30px "Inter", "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px "Inter", "Segoe UI", "Microsoft YaHei", sans-serif; fill: #475569; }
      .lane-title { font: 700 16px "Inter", "Segoe UI", "Microsoft YaHei", sans-serif; fill: #334155; }
      .box-title { font: 700 20px "Inter", "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .box-sub { font: 500 13px "Inter", "Segoe UI", "Microsoft YaHei", sans-serif; fill: #475569; }
      .tag { font: 700 12px "Inter", "Segoe UI", "Microsoft YaHei", sans-serif; fill: #334155; }
      .label { font: 700 13px "Inter", "Segoe UI", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .small { font: 500 12px "Inter", "Segoe UI", "Microsoft YaHei", sans-serif; fill: #475569; }
      .card { rx: 18; stroke-width: 1.4; filter: url(#shadow); }
      .lane { fill: #ffffff; stroke: #dbe4ef; stroke-width: 1.2; rx: 24; }
      .fast { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
      .reliable { stroke: #ea580c; stroke-width: 4; fill: none; marker-end: url(#arrow-orange); }
      .ack { stroke: #16a34a; stroke-width: 3.4; fill: none; stroke-dasharray: 9 7; marker-end: url(#arrow-green); }
      .normal { stroke: #64748b; stroke-width: 3.2; fill: none; marker-end: url(#arrow-gray); }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="54" y="58" class="title">goim 可靠消息投递架构</text>
  <text x="54" y="84" class="subtitle">四层解耦：Logic 负责入口，Router 负责决策，Worker 负责可靠投递，Comet 负责长连接下发。</text>

  <rect x="44" y="118" width="1192" height="222" class="lane"/>
  <text x="68" y="150" class="lane-title">主链路：低延迟在线直推</text>

  <rect x="44" y="392" width="1192" height="218" class="lane"/>
  <text x="68" y="424" class="lane-title">可靠链路：离线、失败、重试与审计</text>

  <rect x="70" y="184" width="154" height="92" class="card" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="94" y="220" class="box-title">Business</text>
  <text x="94" y="245" class="box-sub">Notify / HTTP API</text>

  <rect x="278" y="170" width="168" height="118" class="card" fill="url(#logic)" stroke="#60a5fa"/>
  <text x="318" y="210" class="box-title">Logic</text>
  <text x="302" y="238" class="box-sub">HTTP / gRPC</text>
  <text x="302" y="260" class="box-sub">Session / Online</text>

  <rect x="502" y="170" width="188" height="118" class="card" fill="url(#router)" stroke="#4ade80"/>
  <text x="550" y="210" class="box-title">Router</text>
  <text x="526" y="238" class="box-sub">Idempotency / ACK</text>
  <text x="526" y="260" class="box-sub">Route / State / Attempt</text>

  <rect x="828" y="170" width="178" height="118" class="card" fill="url(#comet)" stroke="#22d3ee"/>
  <text x="876" y="210" class="box-title">Comet</text>
  <text x="852" y="238" class="box-sub">TCP / WebSocket</text>
  <text x="852" y="260" class="box-sub">Bucket / Channel / Room</text>

  <rect x="1060" y="184" width="150" height="92" class="card" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1100" y="220" class="box-title">Client</text>
  <text x="1088" y="245" class="box-sub">Web / App / PC</text>

  <rect x="272" y="456" width="174" height="106" class="card" fill="url(#infra)" stroke="#fb923c"/>
  <text x="318" y="495" class="box-title">Redis</text>
  <text x="298" y="523" class="box-sub">Offline Queue</text>
  <text x="298" y="545" class="box-sub">Message State</text>

  <rect x="502" y="456" width="188" height="106" class="card" fill="url(#infra)" stroke="#fb923c"/>
  <text x="552" y="495" class="box-title">Kafka</text>
  <text x="526" y="523" class="box-sub">User / Room / Broadcast</text>
  <text x="526" y="545" class="box-sub">ACK Batch / DLQ</text>

  <rect x="760" y="456" width="190" height="106" class="card" fill="url(#worker)" stroke="#a78bfa"/>
  <text x="818" y="495" class="box-title">Worker</text>
  <text x="786" y="523" class="box-sub">Consumer Group</text>
  <text x="786" y="545" class="box-sub">Retry / DLQ / Fan-out</text>

  <path d="M224 230 H278" class="normal"/>
  <path d="M446 230 H502" class="normal"/>
  <path d="M690 230 C738 230 762 230 828 230" class="fast"/>
  <path d="M1006 230 H1060" class="fast"/>

  <path d="M596 288 C590 342 466 390 376 456" class="reliable"/>
  <path d="M596 288 C596 352 596 392 596 456" class="reliable"/>
  <path d="M690 509 H760" class="reliable"/>
  <path d="M950 509 C1012 486 1018 316 917 288" class="reliable"/>

  <path d="M1136 276 C1136 342 1044 360 918 315 C800 276 744 302 690 318" class="ack"/>
  <path d="M596 318 C530 352 444 360 362 288" class="ack"/>
  <path d="M596 318 C594 358 595 404 596 456" class="ack"/>

  <rect x="706" y="198" width="98" height="26" rx="13" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="722" y="216" class="tag">Fast Path</text>
  <rect x="640" y="350" width="120" height="28" rx="14" fill="#ffedd5" stroke="#fdba74"/>
  <text x="658" y="369" class="tag">Reliable Path</text>
  <rect x="930" y="324" width="92" height="28" rx="14" fill="#dcfce7" stroke="#86efac"/>
  <text x="954" y="343" class="tag">ACK</text>

  <rect x="68" y="638" width="1144" height="44" rx="16" fill="#ffffff" stroke="#dbe4ef"/>
  <circle cx="96" cy="660" r="6" fill="#2563eb"/>
  <text x="112" y="665" class="small">在线用户走 gRPC direct push，降低端到端延迟。</text>
  <circle cx="420" cy="660" r="6" fill="#ea580c"/>
  <text x="436" y="665" class="small">离线或直推失败写 Redis + Kafka，由 Worker 重试和补偿。</text>
  <circle cx="790" cy="660" r="6" fill="#16a34a"/>
  <text x="806" y="665" class="small">客户端 ACK 回流 Router，更新状态并合并发布 ACK 事件。</text>
</svg>
