        msgID:m.msgID||"", pathKind:m.pathKind||"direct", timestamp:m.timestamp||Date.now()
      });
    });
    $("#loadMoreBtn").classList.remove("hidden");
  }

  // ============ Bind Events ============

  function bindEvents() {
    // Theme
    $("#themeToggle").addEventListener("click", toggleTheme);

    // Mobile nav
    $$("#mobileNav button").forEach(function(btn) {
      btn.addEventListener("click", function() { showMobilePanel(btn.dataset.panel); });
    });

    // Client list actions
    $("#clientList").addEventListener("click", function(evt) {
      var btn = evt.target.closest("button[data-action]");
      if (!btn) return;
      var id = btn.dataset.client;
      if (btn.dataset.action==="connect") connectClient(id);
      if (btn.dataset.action==="disconnect") disconnectClient(id);
      if (btn.dataset.action==="edit") openEditClient(id);
      if (btn.dataset.action==="delete") deleteClientConfirm(id);
    });

    // Add client
    $("#addClient").addEventListener("click", function() { openAddClient(); });
    $("#resetClients").addEventListener("click", function() { if (confirm("确定要重置所有客户端为默认吗？已连接的将先断开。")) resetClients(); });
    $("#connectAll").addEventListener("click", function() { clients.forEach(function(c){connectClient(c.id);}); });
    $("#disconnectAll").addEventListener("click", function() { clients.forEach(function(c){disconnectClient(c.id);}); });
    $("#clearTimeline").addEventListener("click", function() {
      if (confirm("确定要清空时间线和所有历史消息吗？")) {
        $("#timeline").innerHTML = '<div id="loadMoreBtn" class="load-more-btn hidden">加载更多历史消息</div><button id="newMsgFloat" class="new-msg-float">↓ 新消息</button>';
        clearAllStorage();
        allTimelineEvents = [];
        loadedCount = 0;
        unreadCounts = {};
        renderClients();
      }
    });
    $("#refreshOnline").addEventListener("click", function() { refreshOnlineTotal().catch(function(e){addEvent("error","Online",e.message);}); });
    $("#saveConfig").addEventListener("click", saveConfig);

    // Quick add preset
    $("#quickAddPreset").addEventListener("change", function() {
      var val = this.value;
      if (val==="dual-device") {
        clients.push(hydrateClient({ name:"User Web", mid:2001, key:"gotoim-user-web-"+Math.random().toString(36).slice(2,7), deviceId:"web-2001-"+Math.random().toString(36).slice(2,7), platform:"web", room:"live://1000" }));
        clients.push(hydrateClient({ name:"User Phone", mid:2001, key:"gotoim-user-phone-"+Math.random().toString(36).slice(2,7), deviceId:"phone-2001-"+Math.random().toString(36).slice(2,7), platform:"ios", room:"live://1000" }));
      } else if (val==="two-users") {
        clients.push(hydrateClient({ name:"User A", mid:3001, key:"gotoim-user-a-"+Math.random().toString(36).slice(2,7), deviceId:"web-3001-"+Math.random().toString(36).slice(2,7), platform:"web", room:"live://1000" }));
        clients.push(hydrateClient({ name:"User B", mid:3002, key:"gotoim-user-b-"+Math.random().toString(36).slice(2,7), deviceId:"web-3002-"+Math.random().toString(36).slice(2,7), platform:"web", room:"live://1000" }));
      } else if (val==="room-group") {
        clients.push(hydrateClient({ name:"Group A", mid:4001, key:"gotoim-group-a-"+Math.random().toString(36).slice(2,7), deviceId:"web-4001-"+Math.random().toString(36).slice(2,7), platform:"web", room:"live://1000" }));
        clients.push(hydrateClient({ name:"Group B", mid:4002, key:"gotoim-group-b-"+Math.random().toString(36).slice(2,7), deviceId:"web-4002-"+Math.random().toString(36).slice(2,7), platform:"android", room:"live://1000" }));
        clients.push(hydrateClient({ name:"Group C", mid:4003, key:"gotoim-group-c-"+Math.random().toString(36).slice(2,7), deviceId:"web-4003-"+Math.random().toString(36).slice(2,7), platform:"web", room:"live://1000" }));
      }
      if (val) { saveClients(); renderClients(); renderSelects(); this.value = ""; }
    });

    // Config changes
    ["#apiHost","#wsHost","#defaultRoom","#defaultAccepts","#heartbeatSeconds","#autoAck","#autoConnect","#desktopNotify","#soundNotify"].forEach(function(sel){
      $(sel).addEventListener("change", function() { renderClients(); $("#roomStatus").textContent = $("#defaultRoom").value||"live://1000"; });
    });
    $("#autoReconnect").addEventListener("change", renderClients);

    // Metrics
    $("#refreshMetrics").addEventListener("click", refreshMetrics);
    $("#metricsAutoRefresh").addEventListener("change", startMetricsAutoRefresh);
    $("#metricsInterval").addEventListener("change", startMetricsAutoRefresh);

    // Composer
    $("#composerMode").addEventListener("change", function() {
      var mode = $("#composerMode").value;
      var target = $("#composerTarget");
      if (mode==="mids") target.value = "1002";
      if (mode==="keys") target.value = clients.length>2?clients[2].key:"";
      if (mode==="room") target.value = "live://1000";
      if (mode==="all") target.value = "0";
    });

    $("#composer").addEventListener("submit", async function(evt) {
      evt.preventDefault();
      var from = getClient($("#composerFrom").value);
      var mode = $("#composerMode").value;
      var target = $("#composerTarget").value.trim();
      var text = $("#composerText").value.trim();
      if (!from||!text) return;
      var payload = defaultPayload(from, text, mode, target);
      var body = JSON.stringify(payload);
      var localMsgID = "local-"+Date.now()+"-"+Math.random().toString(36).slice(2,6);
      // Show pending state immediately, before HTTP call
      var record = renderTrackedEvent("sent", from.name+" 发送", text, mode+"="+(target||"all"), {
        msgID: localMsgID, op: 9, fromMid: from.mid, toMid: payload.to||0, pathKind: "direct",
        _retryMode: mode, _retryTarget: target, _retryBody: body
      });
      updateMessageStatus(localMsgID, "pending");
      $("#composerText").value = "";
      recordPath("direct");
      try {
        var result = await sendPush(mode, "9", target, body, {speed:0});
        // Use server-returned msgID to replace local placeholder for ACK correlation
        var serverMsgIDs = (result && result.data && result.data.msg_ids) || (result && result.data && result.data.msg_id && [result.data.msg_id]) || [];
        if (serverMsgIDs.length) {
          // Replace tracking key: server msgID is the real key for ACK matching
          trackedMessages.delete(localMsgID);
          record.msgID = serverMsgIDs[0];
          trackedMessages.set(serverMsgIDs[0], record);
          // Update the event DOM with the real msgID
          if (record.event) {
            record.event.dataset.trackId = serverMsgIDs[0];
            record.event.dataset.msgId = serverMsgIDs[0];
            var chip = record.event.querySelector(".msg-id-chip");
            if (chip) { chip.textContent = "msg_id="+serverMsgIDs[0]; chip.dataset.copyMsg = serverMsgIDs[0]; }
            var retryBtn = record.event.querySelector(".retry-btn");
            if (retryBtn) retryBtn.dataset.retryMsg = serverMsgIDs[0];
          }
        }
        updateMessageStatus(record.msgID, "delivered");
      } catch(e) {
        updateMessageStatus(record.msgID, "failed");
        addEvent("error","发送失败",e.message);
      }
    });

    // Push form
    $("#pushEndpoint").addEventListener("change", function() {
      var ep = $("#pushEndpoint").value;
      var target = $("#pushTarget");
      $("#pushTypeWrap").classList.toggle("hidden", ep!=="room");
      $("#pushSpeed").disabled = ep!=="all";
      if (ep==="mids") target.value = "1002";
      if (ep==="keys") target.value = clients.length>2?clients[2].key:"";
      if (ep==="room") target.value = "live://1000";
      if (ep==="all") target.value = "";
    });

    $("#manualPushForm").addEventListener("submit", async function(evt) {
      evt.preventDefault();
      try {
        var result = await sendPush($("#pushEndpoint").value, $("#pushOperation").value, $("#pushTarget").value, $("#pushBody").value, {speed:$("#pushSpeed").value});
        addEvent("system","HTTP Push","提交成功 "+compact(result,160), "",{op:Number($("#pushOperation").value)});
      } catch(e) { addEvent("error","HTTP Push",e.message); }
    });

    // Room form
    $("#roomForm").addEventListener("submit", function(evt) {
      evt.preventDefault();
      var client = getClient($("#roomClient").value);
      var room = $("#roomChangeValue").value.trim();
      if (!client||!room) return;
      try {
        sendProtocol(client, OP_CHANGE_ROOM, textEncoder.encode(room), "ChangeRoom "+room);
        client.room = room;
        $("#roomStatus").textContent = room;
        renderClients();
      } catch(e) { addEvent("error","ChangeRoom",e.message); }
    });

    // Watch form
    var watchAction = "sub";
    $("#watchForm").addEventListener("click", function(evt) {
      var btn = evt.target.closest("button[data-watch-action]");
      if (btn) watchAction = btn.dataset.watchAction;
    });
    $("#watchForm").addEventListener("submit", function(evt) {
      evt.preventDefault();
      var client = getClient($("#watchClient").value);
      var ops = $("#watchOps").value.trim();
      if (!client||!ops) return;
      try {
        sendProtocol(client, watchAction==="sub"?OP_SUB:OP_UNSUB, textEncoder.encode(ops), (watchAction==="sub"?"Sub ":"Unsub ")+ops);
      } catch(e) { addEvent("error","订阅控制",e.message); }
    });

    // WS Sync
    $("#wsSyncForm").addEventListener("submit", function(evt) {
      evt.preventDefault();
      var client = getClient($("#wsSyncClient").value);
      if (!client) return;
      try {
        sendProtocol(client, OP_SYNC_REQ, marshalSyncReq($("#wsSyncLastSeq").value, $("#wsSyncLimit").value), "SyncReq last_seq="+$("#wsSyncLastSeq").value);
      } catch(e) { addEvent("error","WS SyncReq",e.message); }
    });

    // Offline push
    $("#offlinePushForm").addEventListener("submit", async function(evt) {
      evt.preventDefault();
      try {
        var params = { mid:$("#offlineMid").value, seq:$("#offlineSeq").value, op:$("#offlineOp").value };
        var result = assertResult(await postRaw("/goim/push/offline",params,$("#offlineBody").value));
        addEvent("system","离线写入","提交成功 "+compact(result,160), "mid="+params.mid+" seq="+params.seq,{op:Number(params.op)});
      } catch(e) { addEvent("error","离线写入",e.message); }
    });

    // HTTP Sync
    $("#httpSyncForm").addEventListener("submit", async function(evt) {
      evt.preventDefault();
      try {
        var params = { mid:$("#httpSyncMid").value, last_seq:$("#httpSyncLastSeq").value, limit:$("#httpSyncLimit").value };
        var r = await fetch(apiUrl("/goim/sync",params));
        if (!r.ok) throw new Error("HTTP "+r.status);
        var buffer = await r.arrayBuffer();
        var reply = handleSyncReply(null, buffer, "HTTP Sync mid="+params.mid);
        if (reply) { $("#httpSyncLastSeq").value = reply.currentSeq; setResult(reply); }
      } catch(e) { addEvent("error","HTTP Sync",e.message); }
    });

    // Tab buttons
    $$(".tab-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        $$(".tab-btn").forEach(function(b){b.classList.remove("active");});
        $$(".tab-panel").forEach(function(p){p.classList.remove("active");});
        btn.classList.add("active");
        $("#tab-"+btn.dataset.tab).classList.add("active");
      });
    });

    // Observe buttons
    $("[data-observe='total']").addEventListener("click", function() { refreshOnlineTotal().catch(function(e){setResult("Error: "+e.message);}); });
    $("[data-observe='room']").addEventListener("click", async function() {
      try { var params=new URLSearchParams(); params.set("type",$("#onlineType").value||"live"); appendList(params,"rooms",csvValues($("#onlineRooms").value)); var r=assertResult(await fetchJSON("/goim/online/room",params)); setResult(r); } catch(e) { setResult("Error: "+e.message); }
    });
    $("[data-observe='top']").addEventListener("click", async function() {
      try { var r=assertResult(await fetchJSON("/goim/online/top",{type:$("#onlineType").value||"live",limit:$("#onlineLimit").value||10})); setResult(r); } catch(e) { setResult("Error: "+e.message); }
    });
    $("[data-observe='weighted']").addEventListener("click", async function() {
      try { var r=assertResult(await fetchJSON("/goim/nodes/weighted",{platform:$("#nodePlatform").value||"web"})); setResult(r); } catch(e) { setResult("Error: "+e.message); }
    });
    $("[data-observe='instances']").addEventListener("click", async function() {
      try { var r=assertResult(await fetchJSON("/goim/nodes/instances")); setResult(r); } catch(e) { setResult("Error: "+e.message); }
    });
    $("[data-observe='metrics']").addEventListener("click", async function() {
      try { var r=await fetch(apiUrl("/metrics")); var t=await r.text(); setResult(t.slice(0,4000)); } catch(e) { setResult("Error: "+e.message); }
    });

    // Search
    $("#searchInput").addEventListener("input", applySearchAndFilter);
    $("#filterToggle").addEventListener("click", function() { $("#filterPanel").classList.toggle("active"); });
    $("#prevMatch").addEventListener("click", function() { navigateMatch("prev"); });
    $("#nextMatch").addEventListener("click", function() { navigateMatch("next"); });
    $("#clearSearch").addEventListener("click", clearSearch);
    $("#clearFilter").addEventListener("click", clearSearch);
    $("#filterOp").addEventListener("change", applySearchAndFilter);
    $("#filterKind").addEventListener("change", applySearchAndFilter);
    $("#filterFromMid").addEventListener("input", function() { clearTimeout(this._timer); this._timer=setTimeout(applySearchAndFilter,300); });
    $("#filterTime").addEventListener("change", applySearchAndFilter);

    // View filter
    $("#viewFilter").addEventListener("change", applyViewFilter);

    // Float new msg button
    $("#timeline").addEventListener("click", function(evt) {
      if (evt.target.id==="newMsgFloat") scrollToLatest();
    });
    $("#timeline").addEventListener("scroll", function() {
      if (checkTimelineInView()) $("#newMsgFloat").classList.remove("visible");
    });

    // Load more — load older messages, insert after loadMoreBtn
    $("#timeline").addEventListener("click", function(evt) {
      if (evt.target.id==="loadMoreBtn") {
        var lb = $("#loadMoreBtn");
        loadRecentMessages(PAGE_SIZE).then(function(msgs){
          if (!msgs.length) { lb.classList.add("hidden"); return; }
          var frag = document.createDocumentFragment();
          msgs.forEach(function(m) {
            var item = document.createElement("article");
            item.className = "event "+(m.type||"system");
            var metaText = m.meta?" · "+m.meta:"";
            item.dataset.timestamp = m.timestamp||Date.now();
            item.dataset.fromMid = m.from_mid||0;
            item.dataset.toMid = m.to_mid||0;
            item.dataset.op = m.op||0;
            if (m.msgID) item.dataset.msgId = m.msgID;
            if (m.pathKind) item.dataset.pathKind = m.pathKind;
            item.innerHTML =
              '<div class="event-title">'+
                '<span class="event-title-main"><span>'+escapeHTML(m.client_name||"")+'</span></span>'+
                '<span class="event-title-meta">'+escapeHTML(new Date(m.timestamp).toLocaleTimeString("zh-CN",{hour12:false})+metaText)+'</span>'+
              '</div>'+
              '<div class="event-body">'+escapeHTML(m.body||"")+'</div>';
            allTimelineEvents.unshift(item);
            frag.appendChild(item);
          });
          // Insert older messages right after the loadMoreBtn, before existing events
          lb.after(frag);
        });
      }
      // Copy msg_id
      var chip = evt.target.closest("[data-copy-msg]");
      if (chip) {
        var txt = chip.dataset.copyMsg;
        navigator.clipboard.writeText(txt).then(function() {
          chip.textContent = "已复制!";
          setTimeout(function(){ chip.textContent = "msg_id="+txt; }, 1500);
        }).catch(function() {});
      }
      // Retry — actually resend the original payload
      var retry = evt.target.closest("[data-retry-msg]");
      if (retry) {
        var msgID = retry.dataset.retryMsg;
        var record = trackedMessages.get(msgID);
        if (record && record._retryBody && record._retryMode) {
          updateMessageStatus(msgID, "pending");
          addEvent("system","重试","正在重发 msg_id="+msgID,"retry");
          sendPush(record._retryMode, "9", record._retryTarget, record._retryBody, {speed:0})
            .then(function(result) {
              // After HTTP success, mark as delivered (server has it).
              // If the server returns a new msgID, track that too.
              var serverMsgIDs = (result && result.data && result.data.msg_ids) || (result && result.data && result.data.msg_id && [result.data.msg_id]) || [];
              if (serverMsgIDs.length && serverMsgIDs[0] !== msgID) {
                trackedMessages.delete(msgID);
                record.msgID = serverMsgIDs[0];
                trackedMessages.set(serverMsgIDs[0], record);
                if (record.event) {
                  record.event.dataset.trackId = serverMsgIDs[0];
                  record.event.dataset.msgId = serverMsgIDs[0];
                  var chip2 = record.event.querySelector(".msg-id-chip");
                  if (chip2) { chip2.textContent = "msg_id="+serverMsgIDs[0]; chip2.dataset.copyMsg = serverMsgIDs[0]; }
                  var retryBtn2 = record.event.querySelector(".retry-btn");
                  if (retryBtn2) retryBtn2.dataset.retryMsg = serverMsgIDs[0];
                }
              }
              updateMessageStatus(record.msgID, "delivered");
            })
            .catch(function(e) {
              updateMessageStatus(msgID, "failed");
              addEvent("error","重试失败","msg_id="+msgID+" "+e.message);
            });
        } else {
          addEvent("error","重试","无法重试：缺少原始消息数据 msg_id="+msgID);
        }
      }
    });

    // Client modal
    $("#clientForm").addEventListener("submit", function(evt) {
      evt.preventDefault();
      var id = $("#clientFormId").value;
      var data = {
        name: $("#clientFormName").value.trim(),
        mid: Number($("#clientFormMid").value),
        key: $("#clientFormKey").value.trim(),
        deviceId: $("#clientFormDevice").value.trim(),
        platform: $("#clientFormPlatform").value,
        room: $("#clientFormRoom").value.trim()
      };
      if (!data.name||!data.key||!data.deviceId) return;
      if (id) {
        var client = getClient(id);
        if (client) {
          if (client.status==="connected"||client.status==="connecting"||client.status==="reconnecting") {
            addEvent("error","编辑客户端","已连接的客户端编辑后需断开后生效，已忽略此次修改");
          } else {
            Object.assign(client, data);
          }
        }
      } else {
        clients.push(hydrateClient(data));
      }
      saveClients();
      renderClients();
      renderSelects();
      $("#clientModal").classList.remove("active");
    });

    $("#closeClientModal").addEventListener("click", function() { $("#clientModal").classList.remove("active"); });
    $("#clientModal").addEventListener("click", function(evt) { if (evt.target===this) this.classList.remove("active"); });
    $("#generateClientIds").addEventListener("click", function() {
      var ids = makeClientIds($("#clientFormName").value, $("#clientFormPlatform").value);
      $("#clientFormKey").value = ids.key;
      $("#clientFormDevice").value = ids.deviceId;
    });

    // Storage management
    $("#clearStorage").addEventListener("click", function() {
      var range = $("#cleanupRange").value;
      var labels = { "1h":"最近1小时以后","today":"今天以前","7d":"7天以前","all":"全部" };
      if (confirm("确定要清理 "+labels[range]+" 的消息历史吗？此操作不可撤销。")) {
        clearStorageByRange(range);
      }
    });
    $("#exportStorage").addEventListener("click", exportMessagesJSON);
    $("#exportMessages").addEventListener("click", exportMessagesJSON);
    $("#clearTrace").addEventListener("click", function() { traceItems.length=0; trackedMessages.clear(); renderTrace(); });

    // Page visibility
    document.addEventListener("visibilitychange", function() {
      if (!document.hidden) {
        Object.keys(notifyThrottle).forEach(function(k){delete notifyThrottle[k];});
      }
    });
  }

  function openAddClient() {
    editingClientId = "";
    $("#clientModalTitle").textContent = "添加客户端";
    $("#clientFormId").value = "";
    $("#clientFormName").value = "";
    $("#clientFormMid").value = "";
    var ids = makeClientIds("", "web");
    $("#clientFormKey").value = ids.key;
    $("#clientFormDevice").value = ids.deviceId;
    $("#clientFormPlatform").value = "web";
    $("#clientFormRoom").value = $("#defaultRoom").value||"live://1000";
    $("#clientModal").classList.add("active");
  }

  function openEditClient(id) {
    var c = getClient(id); if (!c) return;
    editingClientId = id;
    $("#clientModalTitle").textContent = "编辑客户端";
    $("#clientFormId").value = c.id;
    $("#clientFormName").value = c.name;
    $("#clientFormMid").value = c.mid;
    $("#clientFormKey").value = c.key;
    $("#clientFormDevice").value = c.deviceId;
    $("#clientFormPlatform").value = c.platform;
    $("#clientFormRoom").value = c.room;
    $("#clientModal").classList.add("active");
  }

  function deleteClientConfirm(id) {
    var c = getClient(id); if (!c) return;
    if (!confirm("确定要删除客户端 '"+c.name+"' (mid="+c.mid+") 吗？")) return;
    if (c.status==="connected"||c.status==="connecting") disconnectClient(id, true);
    clients = clients.filter(function(x){return x.id!==id;});
    saveClients();
    renderClients();
    renderSelects();
  }

  // ============ Init ============

  async function init() {
    initTheme();
    loadConfig();
    loadClients();

    // Init IDB
    try { db = await openDB(); dbReady=true; } catch(e) { addEvent("error","IndexedDB","数据库打开失败: "+e.message); }

    clients.forEach(function(c){ c.room = $("#defaultRoom").value.trim()||c.room; });
    renderClients();
    renderSelects();
    bindEvents();
    $("#pushTypeWrap").classList.add("hidden");
    $("#pushSpeed").disabled = true;
    addEvent("system","GoToIM Console","前端已就绪","",{op:0});
    updateStorageSize();

    // Restore messages from IDB
    if (dbReady) await restoreTimeline();

    requestNotifyPermission();
    if ($("#metricsAutoRefresh").checked) startMetricsAutoRefresh();

    refreshOnlineTotal().catch(function() { $("#apiStatus").textContent = "等待 API"; });
    if ($("#autoConnect").checked) {
      setTimeout(function() { clients.forEach(function(c){connectClient(c.id);}); }, 500);
    }
  }

  window.addEventListener("beforeunload", function() {
    unloading = true;
    clients.forEach(function(c) { clearClientTimer(c); if (c.ws) c.ws.close(); });
    stopMetricsAutoRefresh();
    flushWrites();
  });

  document.addEventListener("DOMContentLoaded", init);
})();
</script>
</body>
</html>
