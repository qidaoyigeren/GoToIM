<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GoToIM Console</title>
<style>
:root {
  color-scheme: light;
  --bg: #f6f5f2;
  --panel: #ffffff;
  --panel-soft: #f9faf8;
  --ink: #17202a;
  --muted: #667085;
  --line: #d8ddd5;
  --line-strong: #b9c2b6;
  --teal: #0f766e;
  --teal-soft: #e6f3f1;
  --blue: #2563eb;
  --blue-soft: #eaf0ff;
  --amber: #b45309;
  --amber-soft: #fff4dd;
  --red: #b42318;
  --red-soft: #fff0ed;
  --green: #15803d;
  --shadow: 0 10px 28px rgba(23, 32, 42, 0.08);
  --gray-bg: #f0efe9;
}

[data-theme="dark"] {
  color-scheme: dark;
  --bg: #1a1a2e;
  --panel: #16213e;
  --panel-soft: #1a2744;
  --ink: #e0e0e0;
  --muted: #8899aa;
  --line: #2a3a5c;
  --line-strong: #3a4a6c;
  --teal: #5eead4;
  --teal-soft: #0d3b4a;
  --blue: #60a5fa;
  --blue-soft: #1a3050;
  --amber: #f59e0b;
  --amber-soft: #2e2208;
  --red: #f87171;
  --red-soft: #2a1515;
  --green: #4ade80;
  --shadow: 0 10px 28px rgba(0,0,0,0.35);
  --gray-bg: #1e1e32;
}

* { box-sizing: border-box; }
html, body { height: 100%; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  letter-spacing: 0;
}

button, input, select, textarea {
  font: inherit;
  letter-spacing: 0;
}

button {
  border: 1px solid var(--line-strong);
  background: var(--panel);
  color: var(--ink);
  border-radius: 8px;
  padding: 8px 11px;
  cursor: pointer;
  min-height: 36px;
}
button:hover { border-color: var(--teal); }
button.primary { background: var(--teal); border-color: var(--teal); color: #fff; }
button.blue { background: var(--blue); border-color: var(--blue); color: #fff; }
button.warn { background: var(--amber); border-color: var(--amber); color: #fff; }
button:disabled { cursor: default; opacity: 0.55; }
button.icon-btn { min-height: 32px; padding: 5px 9px; font-size: 13px; }

input, select, textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--ink);
  padding: 8px 10px;
  min-height: 36px;
  outline: none;
}
textarea { min-height: 90px; resize: vertical; }
input:focus, select:focus, textarea:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
}

label {
  display: grid;
  gap: 5px;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.25;
}

.app-shell { min-height: 100%; display: grid; grid-template-rows: auto auto 1fr; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 16px 20px;
  background: #17202a;
  color: #fff;
}

.brand { display: flex; align-items: center; gap: 12px; min-width: 220px; }
.brand-mark {
  width: 38px; height: 38px; border-radius: 8px;
  background: linear-gradient(135deg, #67e8f9 0%, #14b8a6 44%, #f59e0b 100%);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
}
.brand h1 { margin: 0; font-size: 20px; line-height: 1.1; }
.brand p { margin: 3px 0 0; color: rgba(255,255,255,0.68); font-size: 12px; }

.topbar-actions { display: flex; gap: 10px; align-items: center; }
.theme-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.22);
  color: #fff;
  border-radius: 8px;
  padding: 7px 12px;
  cursor: pointer;
  font-size: 14px;
  min-height: 34px;
}
.theme-btn:hover { background: rgba(255,255,255,0.22); }

.status-strip {
  display: grid;
  grid-template-columns: repeat(4, minmax(120px, 1fr));
  gap: 10px;
  flex: 1;
  max-width: 760px;
}
.status-tile {
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 8px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.06);
  min-width: 0;
}
.status-tile span { display: block; color: rgba(255,255,255,0.62); font-size: 11px; }
.status-tile strong { display: block; margin-top: 3px; color: #fff; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.config-strip {
  display: grid;
  grid-template-columns: minmax(160px, 1fr) minmax(160px, 1fr) minmax(130px, 0.8fr) minmax(145px, 0.9fr) minmax(95px, 0.55fr) minmax(95px, 0.55fr) auto;
  gap: 12px;
  align-items: end;
  padding: 12px 20px;
  border-bottom: 1px solid var(--line);
  background: var(--panel);
}
.config-actions {
  display: flex; gap: 8px; align-items: center; justify-content: flex-end; min-width: 220px; flex-wrap: wrap;
}
.config-actions label {
  display: flex; align-items: center; gap: 7px; color: var(--ink); white-space: nowrap; font-size: 12px;
}
.config-actions input[type="checkbox"] { width: 16px; min-height: 16px; height: 16px; padding: 0; }

.layout {
  display: grid;
  grid-template-columns: minmax(260px, 0.75fr) minmax(420px, 1.25fr) minmax(330px, 0.95fr);
  gap: 14px;
  padding: 14px;
  min-height: 0;
}

.panel {
  min-width: 0; min-height: 0;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.panel-title {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--panel-soft);
}
.panel-title h2 { margin: 0; font-size: 15px; }

.button-row { display: flex; flex-wrap: wrap; gap: 8px; }

.client-list { overflow: auto; padding: 10px; display: grid; gap: 9px; }
.client-row {
  display: grid; gap: 10px;
  border: 1px solid var(--line);
  border-radius: 8px; padding: 10px;
  background: var(--panel);
}
.client-row[data-status="connected"] { border-color: rgba(21,128,61,0.35); background: var(--teal-soft); }
.client-row[data-status="connecting"] { border-color: rgba(180,83,9,0.35); background: var(--amber-soft); }
.client-row[data-status="reconnecting"] { border-color: rgba(180,83,9,0.48); background: var(--amber-soft); }
.client-row[data-status="disconnected"] { border-color: rgba(180,35,24,0.22); }
.client-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.client-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
.client-actions button { min-height: 31px; padding: 5px 8px; font-size: 12px; }
.client-name { display: flex; align-items: center; gap: 8px; min-width: 0; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--line-strong); flex: 0 0 auto; }
.dot.connected { background: var(--green); }
.dot.connecting { background: var(--amber); }
.dot.reconnecting { background: var(--amber); }
.dot.disconnected { background: var(--red); }
.client-name strong { display: block; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.client-name span, .client-meta { color: var(--muted); font-size: 12px; }
.client-meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px 8px; }
.client-status-line { color: var(--muted); font-size: 12px; }
.client-status-line.connected { color: var(--green); }
.client-status-line.connecting,
.client-status-line.reconnecting { color: var(--amber); }
.client-status-line.disconnected { color: var(--red); }
.client-meta code, .pill code { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; font-size: 12px; }
.pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  max-width: 100%; padding: 4px 7px;
  border: 1px solid var(--line); border-radius: 999px;
  background: var(--panel-soft); color: var(--muted); font-size: 12px;
}

.timeline-toolbar {
  display: flex; gap: 8px; padding: 8px 14px; border-bottom: 1px solid var(--line);
  background: var(--panel-soft); flex-wrap: wrap; align-items: center;
}
.timeline-toolbar select { width: auto; min-width: 120px; }
.search-wrap { position: relative; flex: 1; min-width: 180px; }
.search-wrap input { padding-left: 32px; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
.filter-btn { white-space: nowrap; }
.filter-panel {
  display: none; gap: 8px; padding: 8px 14px; border-bottom: 1px solid var(--line);
  background: var(--panel-soft); flex-wrap: wrap; align-items: end;
}
.filter-panel.active { display: flex; }
.filter-panel label { min-width: 100px; }
.filter-panel select { width: auto; }
.filter-panel input { width: auto; }
.search-info { font-size: 12px; color: var(--muted); padding: 4px 14px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.search-info button { font-size: 11px; min-height: 24px; padding: 2px 7px; }

.timeline {
  min-height: 0; flex: 1; overflow: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  background: linear-gradient(180deg, rgba(15,118,110,0.05), transparent 180px), var(--gray-bg);
}
.load-more-btn {
  text-align: center; padding: 8px;
  background: var(--panel-soft); border: 1px dashed var(--line);
  border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 13px;
}
.load-more-btn:hover { border-color: var(--teal); color: var(--teal); }

.event {
  max-width: min(760px, 92%);
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 9px 10px;
  align-self: flex-start;
  transition: opacity 0.2s;
}
.event.dimmed { opacity: 0.2; }
.event.sent { align-self: flex-end; background: var(--blue-soft); border-color: rgba(37,99,235,0.22); }
.event.received { background: var(--teal-soft); border-color: rgba(15,118,110,0.2); }
.event.system { align-self: center; max-width: 92%; background: var(--panel); }
.event.error { background: var(--red-soft); border-color: rgba(180,35,24,0.24); }
.event-title { display: flex; justify-content: space-between; align-items: center; gap: 12px; color: var(--muted); font-size: 12px; }
.event-title-main, .event-title-meta { display: inline-flex; align-items: center; gap: 7px; min-width: 0; }
.event-body { margin-top: 5px; white-space: pre-wrap; word-break: break-word; line-height: 1.45; }
.event-footer { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; margin-top: 7px; color: var(--muted); font-size: 11px; }

.path-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; padding: 1px 5px; border-radius: 999px;
  font-weight: 600;
}
.path-direct { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
.path-reliable { background: #fff7ed; color: #9a3412; border: 1px solid #fdba74; }
[data-theme="dark"] .path-direct { background: #064e3b; color: #6ee7b7; border-color: #059669; }
[data-theme="dark"] .path-reliable { background: #431407; color: #fdba74; border-color: #9a3412; }

.msg-id-chip {
  border: 1px solid var(--line); border-radius: 999px;
  background: var(--panel); color: var(--muted); padding: 2px 6px; cursor: pointer; font-size: 11px;
}
.status-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%; font-size: 12px; font-weight: 700; flex: 0 0 auto;
}
.status-pending { border: 2px solid var(--line-strong); border-top-color: var(--muted); animation: spin 0.9s linear infinite; }
.status-delivered { color: var(--muted); }
.status-acked { color: var(--blue); }
.status-failed { color: var(--red); background: var(--red-soft); }
.retry-btn { min-height: 24px; padding: 2px 7px; border-color: rgba(180,35,24,0.35); color: var(--red); font-size: 11px; }

@keyframes spin { to { transform: rotate(360deg); } }

.composer {
  display: grid;
  grid-template-columns: minmax(120px, 0.8fr) minmax(105px, 0.6fr) minmax(130px, 0.8fr) minmax(180px, 1.2fr) minmax(76px, auto);
  gap: 9px; padding: 12px;
  border-top: 1px solid var(--line);
  background: var(--panel);
  align-items: end;
}

.ops-body { min-height: 0; overflow: auto; padding: 12px; }
.tabs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 10px 10px 0; }
.tab-btn { min-height: 34px; padding: 7px 8px; color: var(--muted); background: var(--panel); }
.tab-btn.active { color: #fff; background: #17202a; border-color: #17202a; }
.tab-panel { display: none; }
.tab-panel.active { display: grid; gap: 14px; }

.tool-block { display: grid; gap: 10px; padding-top: 12px; border-top: 1px solid var(--line); }
.tool-block:first-child { border-top: 0; padding-top: 0; }
.tool-block h3 { margin: 0; font-size: 14px; }
.form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
.form-grid .span-2 { grid-column: 1 / -1; }

/* Metrics Cards */
.metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.metric-card {
  border: 1px solid var(--line); border-radius: 8px; padding: 10px;
  background: var(--panel); text-align: center;
}
.metric-card .metric-value { font-size: 22px; font-weight: 700; color: var(--teal); }
.metric-card .metric-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.metric-card .metric-delta { font-size: 11px; margin-top: 2px; }
.metric-delta.up { color: var(--green); }
.metric-delta.down { color: var(--red); }
.metrics-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; padding: 4px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); }
.metrics-chart .bar { flex: 1; background: var(--teal); border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.3s; }
.metrics-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* Path Stats */
.path-stats { display: grid; gap: 8px; }
.path-bar-wrap { display: flex; align-items: center; gap: 8px; }
.path-bar-label { width: 55px; font-size: 12px; color: var(--muted); white-space: nowrap; }
.path-bar-track { flex: 1; height: 18px; background: var(--panel-soft); border-radius: 9px; overflow: hidden; display: flex; }
.path-bar-direct { background: #10b981; transition: flex 0.3s; }
.path-bar-reliable { background: #f59e0b; transition: flex 0.3s; }
.path-bar-count { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 50px; }

/* Sync Progress */
.sync-progress { display: none; padding: 8px 12px; background: var(--amber-soft); border: 1px solid var(--amber); border-radius: 8px; font-size: 12px; color: var(--amber); }
.sync-progress.active { display: block; }
.sync-progress-bar { height: 6px; background: var(--line); border-radius: 3px; margin-top: 4px; overflow: hidden; }
.sync-progress-fill { height: 100%; background: var(--amber); border-radius: 3px; transition: width 0.3s; }

/* Floating new-msg button */
.new-msg-float {
  position: sticky; bottom: 8px; align-self: center;
  background: var(--blue); color: #fff; border: none; border-radius: 999px;
  padding: 6px 16px; font-size: 12px; cursor: pointer; box-shadow: var(--shadow);
  display: none; z-index: 5;
}
.new-msg-float.visible { display: block; }

/* Unread badge */
.unread-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 18px; height: 18px; border-radius: 9px;
  background: var(--red); color: #fff; font-size: 10px; font-weight: 700;
  padding: 0 5px; margin-left: 4px;
}

/* Notify config */
.notify-config { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.notify-config label { display: flex; flex-direction: row; align-items: center; gap: 6px; font-size: 12px; color: var(--ink); }
.notify-config input[type="checkbox"] { width: 16px; min-height: 16px; height: 16px; padding: 0; }

.result-box {
  margin-top: 12px;
  border: 1px solid var(--line); border-radius: 8px;
  background: #101820; color: #d6f3ee;
  min-height: 150px; max-height: 300px; overflow: auto;
  padding: 10px; white-space: pre-wrap; word-break: break-word;
  font: 12px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
}

.trace-toolbar { display: flex; align-items: end; gap: 8px; }
.trace-list { display: grid; gap: 8px; }
.trace-item { border: 1px solid var(--line); border-radius: 8px; padding: 8px; background: var(--panel); }
.trace-head { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--muted); }
.trace-body { margin-top: 5px; word-break: break-word; }

.modal-backdrop {
  position: fixed; inset: 0; z-index: 20;
  display: none; align-items: center; justify-content: center;
  padding: 18px; background: rgba(23,32,42,0.46);
}
.modal-backdrop.active { display: flex; }
.modal {
  width: min(560px, 100%); max-height: 92vh; overflow: auto;
  border: 1px solid var(--line); border-radius: 8px;
  background: var(--panel);
  box-shadow: 0 18px 60px rgba(23,32,42,0.28);
}
.modal-header, .modal-footer {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line); background: var(--panel-soft);
}
.modal-footer { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; }
.modal-header h2 { margin: 0; font-size: 15px; }
.modal-body { display: grid; gap: 10px; padding: 14px; }

.small { color: var(--muted); font-size: 12px; }
.hidden { display: none !important; }

/* Mobile bottom nav */
.mobile-nav { display: none; }
@media (max-width: 820px) {
  .mobile-nav {
    display: flex;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 15;
    background: var(--panel); border-top: 1px solid var(--line);
  }
  .mobile-nav button {
    flex: 1; border: none; border-radius: 0; background: transparent;
    font-size: 11px; padding: 10px 4px; min-height: auto;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .mobile-nav button.active { color: var(--teal); border-top: 2px solid var(--teal); margin-top: -1px; }

  .topbar, .config-strip, .layout, .composer { grid-template-columns: 1fr; }
  .topbar { display: grid; }
  .status-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); max-width: none; }
  .layout { padding: 10px; padding-bottom: 60px; }
  .config-actions { justify-content: flex-start; min-width: 0; }
  .event { max-width: 100%; }

  .layout { display: flex; overflow-x: hidden; }
  .layout > .panel { flex: 0 0 100%; width: 100%; display: none; }
  .layout > .panel.mobile-active { display: flex; }
  .clients-panel.mobile-active, .conversation-panel.mobile-active, .ops-panel.mobile-active { display: flex; }
  .composer { display: none; }
  .composer.mobile-active { display: grid; }
  .timeline-toolbar { flex-direction: column; }
  .filter-panel { flex-direction: column; }
  .filter-panel label { min-width: auto; }
  .metrics-grid { grid-template-columns: 1fr; }
}

@media (max-width: 1180px) {
  .layout { grid-template-columns: minmax(240px, 0.8fr) minmax(420px, 1.2fr); }
  .ops-panel { grid-column: 1 / -1; }
}

/* mark highlight */
mark { background: #fde68a; color: #17202a; padding: 0 2px; border-radius: 2px; }
[data-theme="dark"] mark { background: #854d0e; color: #fef3c7; }
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div>
        <h1>GoToIM 控制台</h1>
        <p>Comet / Logic / Job</p>
      </div>
    </div>
    <div class="status-strip" aria-live="polite">
      <div class="status-tile"><span>API</span><strong id="apiStatus">待连接</strong></div>
      <div class="status-tile"><span>WebSocket</span><strong id="wsStatus">0 在线</strong></div>
      <div class="status-tile"><span>连接数</span><strong id="connStatus">-</strong></div>
      <div class="status-tile"><span>当前房间</span><strong id="roomStatus">live://1000</strong></div>
    </div>
    <div class="topbar-actions">
      <button id="themeToggle" class="theme-btn" title="切换主题" aria-label="切换暗色/亮色模式">🌙</button>
    </div>
  </header>

  <section class="config-strip">
    <label>Logic API
      <input id="apiHost" value="" placeholder="same origin 或 localhost:3111" autocomplete="off">
    </label>
    <label>Comet WS
      <input id="wsHost" value="localhost:3102" placeholder="localhost:3102" autocomplete="off">
    </label>
    <label>房间
      <input id="defaultRoom" value="live://1000" autocomplete="off">
    </label>
    <label>订阅 Op
      <input id="defaultAccepts" value="9,21,1000,1001,1002" autocomplete="off">
    </label>
    <label>心跳秒
      <input id="heartbeatSeconds" type="number" min="10" value="30">
    </label>
    <label>重连次数
      <input id="maxReconnectAttempts" type="number" min="0" max="99" value="10">
    </label>
    <div class="config-actions">

<script>
(function() {
  "use strict";

  const RAW_HEADER_LEN = 16;
  const OP_HEARTBEAT = 2;
  const OP_HEARTBEAT_REPLY = 3;
  const OP_AUTH = 7;
  const OP_AUTH_REPLY = 8;
  const OP_RAW = 9;
  const OP_CHANGE_ROOM = 12;
  const OP_CHANGE_ROOM_REPLY = 13;
  const OP_SUB = 14;
  const OP_SUB_REPLY = 15;
  const OP_UNSUB = 16;
  const OP_UNSUB_REPLY = 17;
  const OP_SEND_MSG_ACK = 18;
  const OP_PUSH_MSG_ACK = 19;
  const OP_SYNC_REQ = 20;
  const OP_SYNC_REPLY = 21;

  const opNames = {
    2:"Heartbeat",3:"HeartbeatReply",7:"Auth",8:"AuthReply",9:"Raw",
    12:"ChangeRoom",13:"ChangeRoomReply",14:"Sub",15:"SubReply",
    16:"Unsub",17:"UnsubReply",18:"SendMsgAck",19:"PushMsgAck",
    20:"SyncReq",21:"SyncReply"
  };

  const textEncoder = new TextEncoder();
  const textDecoder = new TextDecoder();
  const CLIENTS_KEY = "gotoim-console-clients";
  const CONFIG_KEY = "gotoim-console-config";
  const THEME_KEY = "gotoim-theme";
  const DB_NAME = "gotoim_messages";
  const DB_VERSION = 1;
  const STORE_NAME = "messages";
  const MAX_STORED = 10000;
  const PAGE_SIZE = 200;
  const TRACE_LIMIT = 50;

  function createDefaultClients() {
    return [
      { id:"aliceWeb", name:"Alice Web", mid:1001, key:"gotoim-alice-web", deviceId:"web-1001", platform:"web", room:"live://1000" },
      { id:"alicePhone", name:"Alice Phone", mid:1001, key:"gotoim-alice-phone", deviceId:"phone-1001", platform:"ios", room:"live://1000" },
      { id:"bobWeb", name:"Bob Web", mid:1002, key:"gotoim-bob-web", deviceId:"web-1002", platform:"web", room:"live://1000" }
    ].map(hydrateClient);
  }

  let clients = createDefaultClients();
  const trackedMessages = new Map();
  const traceItems = [];
  let editingClientId = "";
  let unloading = false;

  // IDB
  let db = null;
  let writeQueue = [];
  let writeTimer = null;
  let dbReady = false;

  // Metrics
  let metricsHistory = [];
  let lastMetricValues = {};
  let metricsRefreshTimer = null;

  // Path stats
  let pathStats = { direct: 0, reliable: 0 };

  // Notification throttle
  let notifyThrottle = {};

  // Search state
  let searchMatches = [];
  let currentMatchIdx = -1;
  let allTimelineEvents = [];

  // Unread
  let unreadCounts = {};
  let currentViewFilter = "all";

  const $ = (s) => document.querySelector(s);
  const $$ = (s) => Array.from(document.querySelectorAll(s));

  function slug(v) {
    return String(v||"client").trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"client";
  }

  function runtimeClientState() {
    return { status:"disconnected", seq:1, ws:null, heartbeatTimer:null, reconnectTimer:null, reconnectAttempts:0, reconnectDelay:1000, manualClose:false, lastSeq:0, online:"-" };
  }

  var clientIdCounter = 0;
  function hydrateClient(c) {
    clientIdCounter += 1;
    return Object.assign(runtimeClientState(), {
      id: c.id||("client-"+Date.now()+"-"+clientIdCounter),
      name: c.name||"Client",
      mid: Number(c.mid)||1000,
      key: c.key||("gotoim-"+Date.now()),
      deviceId: c.deviceId||c.device_id||("device-"+Date.now()),
      platform: c.platform||"web",
      room: c.room||"live://1000"
    });
  }

  function serializeClient(c) {
    return { id:c.id, name:c.name, mid:c.mid, key:c.key, deviceId:c.deviceId, platform:c.platform, room:c.room };
  }

  function saveClients() {
    localStorage.setItem(CLIENTS_KEY, JSON.stringify(clients.map(serializeClient)));
  }

  function loadClients() {
    try {
      const raw = JSON.parse(localStorage.getItem(CLIENTS_KEY)||"[]");
      if (Array.isArray(raw) && raw.length>0) clients = raw.map(hydrateClient);
    } catch(e) { clients = createDefaultClients(); }
  }

  function resetClients() {
    clients.forEach(function(c) { disconnectClient(c.id, true); });
    clients = createDefaultClients();
    saveClients();
    renderClients();
    renderSelects();
  }

  function makeClientIds(name, platform) {
    var suffix = Math.random().toString(36).slice(2,7);
    var base = slug(name);
    return { key:"gotoim-"+base+"-"+suffix, deviceId:(platform||"web")+"-"+base+"-"+suffix };
  }

  function escapeHTML(v) {
    return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }

  function nowTime() {
    return new Date().toLocaleTimeString("zh-CN",{hour12:false});
  }

  function compact(v, maxLen) {
    var t = typeof v==="string"?v:JSON.stringify(v,null,2);
    return t.length<=maxLen?t:t.slice(0,maxLen-1)+"...";
  }

  function csvValues(v) {
    return String(v||"").split(",").map(function(i){return i.trim();}).filter(Boolean);
  }

  function getClient(id) { return clients.find(function(c){return c.id===id;}); }

  function formatStatus(s) {
    if (s==="connected") return "已连接";
    if (s==="connecting") return "连接中";
    if (s==="reconnecting") return "重连中";
    return "未连接";
  }

  function reconnectStatusText(c) {
    if (c.status!=="reconnecting") return formatStatus(c.status);
    return "重连中("+c.reconnectAttempts+"/"+maxReconnectAttempts()+")...";
  }

  function maxReconnectAttempts() {
    var raw = $("#maxReconnectAttempts").value;
    var n = Number(raw);
    return Number.isFinite(n) ? Math.max(0, n) : 10;
  }

  function updateConnectionHealth() {
    var total = clients.length||1;
    var connected = clients.filter(function(c){return c.status==="connected";}).length;
    var reconnecting = clients.filter(function(c){return c.status==="reconnecting"||c.status==="connecting";}).length;
    $("#wsStatus").textContent = connected+"/"+total+" 健康"+(reconnecting?" · "+reconnecting+" 重连中":"");
  }

  function getDefaultAccepts() {
    return csvValues($("#defaultAccepts").value).map(Number).filter(function(n){return Number.isFinite(n);});
  }

  function getApiBase() {
    var raw = $("#apiHost").value.trim();
    if (!raw) return (window.location.origin&&window.location.origin!=="null")?window.location.origin:"http://localhost:3111";
    if (/^https?:\/\//i.test(raw)) return raw.replace(/\/$/,"");
    return ("http://"+raw).replace(/\/$/,"");
  }

  function getWsUrl() {
    var raw = ($("#wsHost").value.trim()||"localhost:3102").replace(/\/$/,"");
    if (/^wss?:\/\//i.test(raw)) return raw.endsWith("/sub")?raw:raw+"/sub";
    var scheme = window.location.protocol==="https:"?"wss":"ws";
    return scheme+"://"+raw+"/sub";
  }

  function apiUrl(path, params) {
    var url = new URL(path, getApiBase());
    if (params instanceof URLSearchParams) {
      params.forEach(function(v,k){url.searchParams.append(k,v);});
    } else if (params) {
      Object.keys(params).forEach(function(k){
        var v=params[k];
        if (Array.isArray(v)) v.forEach(function(i){url.searchParams.append(k,i);});
        else if (v!==undefined&&v!==null&&v!=="") url.searchParams.set(k,v);
      });
    }
    return url.toString();
  }

  async function fetchJSON(path, params) {
    var r = await fetch(apiUrl(path, params));
    var t = await r.text();
    try { return JSON.parse(t); }
    catch(e) { throw new Error("JSON parse failed: "+compact(t,180)); }
  }

  async function postRaw(path, params, body) {
    var r = await fetch(apiUrl(path, params), {method:"POST",headers:{"Content-Type":"application/json;charset=utf-8"},body:body});
    var t = await r.text();
    try { return JSON.parse(t); }
    catch(e) { return {code:r.ok?0:r.status,message:t}; }
  }

  function assertResult(r) {
    if (r&&r.code===0) return r;
    throw new Error((r&&(r.message||r.error||JSON.stringify(r)))||"request failed");
  }

  function appendList(params, name, list) { list.forEach(function(i){params.append(name,i);}); }

  // ============ IndexedDB ============

  function openDB() {
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains(STORE_NAME)) {
          var store = d.createObjectStore(STORE_NAME, { keyPath:"id", autoIncrement:true });
          store.createIndex("timestamp","timestamp",{unique:false});
          store.createIndex("from_mid","from_mid",{unique:false});
          store.createIndex("to_mid","to_mid",{unique:false});
          store.createIndex("op","op",{unique:false});
          store.createIndex("status","status",{unique:false});
        }
      };
      req.onsuccess = function(e) { resolve(e.target.result); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  }

  function flushWrites() {
    if (!db||!writeQueue.length) return;
    var batch = writeQueue.splice(0);
    var tx = db.transaction(STORE_NAME,"readwrite");
    var store = tx.objectStore(STORE_NAME);
    batch.forEach(function(record) { store.put(record); });
    tx.oncomplete = function() { enforceStorageLimit(); };
  }

  function writeMessage(record) {
    writeQueue.push(record);
    if (!writeTimer) writeTimer = setTimeout(function(){ writeTimer=null; flushWrites(); }, 100);
  }

  function updateMessageInDB(msgID, status) {
    if (!db) return;
    var tx = db.transaction(STORE_NAME,"readwrite");
    var store = tx.objectStore(STORE_NAME);
    var idx = store.index("status");
    // We need to find by msgID which is in the body, iterate
    var req = store.openCursor();
    req.onsuccess = function(e) {
      var cursor = e.target.result;
      if (cursor) {
        if (cursor.value.msgID===msgID) {
          var rec = cursor.value;
          rec.status = status;
          cursor.update(rec);
          return;
        }
        cursor.continue();
      }
    };
  }

  function enforceStorageLimit() {
    if (!db) return;
    var tx = db.transaction(STORE_NAME,"readwrite");
    var store = tx.objectStore(STORE_NAME);
    var idx = store.index("timestamp");
    var countReq = store.count();
    countReq.onsuccess = function() {
      if (countReq.result<=MAX_STORED) return;
      var toDelete = countReq.result-MAX_STORED;
      var delReq = idx.openCursor(null,"next");
      var deleted = 0;
      delReq.onsuccess = function(e) {
        var cursor = e.target.result;
        if (cursor&&deleted<toDelete) { cursor.delete(); deleted++; cursor.continue(); }
      };
    };
  }

  var loadedCount = 0;

  async function loadRecentMessages(count) {
    if (!db) return [];
    return new Promise(function(resolve) {
      var tx = db.transaction(STORE_NAME,"readonly");
      var store = tx.objectStore(STORE_NAME);
      var idx = store.index("timestamp");
      var results = [];
      var skip = loadedCount;
      var seen = 0;
      var req = idx.openCursor(null,"prev");
      req.onsuccess = function(e) {
        var cursor = e.target.result;
        if (!cursor) { loadedCount += results.length; resolve(results.reverse()); return; }
        if (seen < skip) { seen++; cursor.continue(); return; }
        if (results.length < count) { results.push(cursor.value); cursor.continue(); }
        else { loadedCount += results.length; resolve(results.reverse()); }
      };
      req.onerror = function() { resolve([]); };
    });
  }

  function updateStorageSize() {
    if (!db) return;
    var tx = db.transaction(STORE_NAME,"readonly");
    var store = tx.objectStore(STORE_NAME);
    var req = store.count();
    req.onsuccess = function() {
      var el = $("#storageSize");
      if (el) el.textContent = "~"+(req.result||0)+" 条消息";
    };
    req.onerror = function() {};
  }

  async function clearStorageByRange(range) {
    if (!db) return;
    var cutoff = 0;
    if (range==="1h") cutoff = Date.now()-3600000;
    else if (range==="today") cutoff = new Date().setHours(0,0,0,0);
    else if (range==="7d") cutoff = Date.now()-7*86400000;
    else if (range==="all") { clearAllStorage(); return; }
    return new Promise(function(resolve) {
      var tx = db.transaction(STORE_NAME,"readwrite");
      var store = tx.objectStore(STORE_NAME);
      var idx = store.index("timestamp");
      var req = idx.openCursor();
      var deleted = 0;
      req.onsuccess = function(e) {
        var cursor = e.target.result;
        if (cursor) {
          if (cursor.value.timestamp<cutoff) { cursor.delete(); deleted++; }
          cursor.continue();
        } else {
          addEvent("system","存储清理","已清理 "+deleted+" 条历史消息");
          updateStorageSize();
          resolve();
        }
      };
    });
  }

  function clearAllStorage() {
    if (!db) return;
    var tx = db.transaction(STORE_NAME,"readwrite");
    var store = tx.objectStore(STORE_NAME);
    store.clear();
    addEvent("system","存储清理","已清空所有历史消息");
    updateStorageSize();
  }

  async function exportMessagesJSON() {
    if (!db) { addEvent("error","导出","数据库未就绪"); return; }
    var all = await new Promise(function(resolve) {
      var tx = db.transaction(STORE_NAME,"readonly");
      var store = tx.objectStore(STORE_NAME);
      var req = store.getAll();
      req.onsuccess = function() { resolve(req.result||[]); };
      req.onerror = function() { resolve([]); };
    });
    var blob = new Blob([JSON.stringify(all,null,2)],{type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "gotoim-messages-"+new Date().toISOString().slice(0,10)+".json";
    a.click();
    URL.revokeObjectURL(url);
    addEvent("system","导出","已导出 "+all.length+" 条消息");
  }

  function showNotification(title, body, msgID) {
    if (!$("#desktopNotify").checked) return;
    if (Notification.permission!=="granted") return;
    if (!document.hidden) return;

    var throttleKey = title;
    var now = Date.now();
    if (notifyThrottle[throttleKey]&&now-notifyThrottle[throttleKey]<5000) return;
    notifyThrottle[throttleKey] = now;

    if ($("#soundNotify").checked) playBeep();

    var n = new Notification(title, {
      body: body.length>100?body.slice(0,97)+"...":body,
      icon: "data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="#0f766e"/></svg>'),
      tag: msgID||""
    });
    n.onclick = function() {
      window.focus();
      if (msgID) scrollToMsg(msgID);
      n.close();
    };
  }

  function playBeep() {
    try {
      var ctx = new (window.AudioContext||window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      osc.type = "sine";
      gain.gain.value = 0.15;
      osc.start(0);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.15);
      osc.stop(ctx.currentTime+0.15);
    } catch(e) {}
  }

  function addEvent(kind, title, body, meta, options) {
    var timeline = $("#timeline");
    var item = document.createElement("article");
    item.className = "event "+kind;
    if (options&&options.trackId) item.dataset.trackId = options.trackId;
    if (options&&options.msgID) item.dataset.msgId = options.msgID;
    if (options&&options.fromMid) item.dataset.fromMid = options.fromMid;
    if (options&&options.toMid) item.dataset.toMid = options.toMid;
    if (options&&options.op) item.dataset.op = options.op;
    if (options) {
      if (options.fromMid!==undefined) item.dataset.fromMid = options.fromMid;
      if (options.toMid!==undefined) item.dataset.toMid = options.toMid;
      if (options.op!==undefined) item.dataset.op = options.op;
      if (options.msgID) item.dataset.msgId = options.msgID;
      if (options.kind) item.dataset.kind = options.kind;
      if (options.pathKind) item.dataset.pathKind = options.pathKind;
      if (options.timestamp) item.dataset.timestamp = options.timestamp;
    }
    item.dataset.timestamp = (options&&options.timestamp)||Date.now();

    var metaText = meta?" · "+meta:"";
    var pathHtml = (options&&options.pathKind)?pathBadge(options.pathKind)+" ":"";
    var msgFooter = options&&options.msgID?(
      '<div class="event-footer">'+
        '<button class="msg-id-chip" type="button" data-copy-msg="'+escapeHTML(options.msgID)+'">msg_id='+escapeHTML(options.msgID)+'</button>'+
        (options.status==="failed"?'<button class="retry-btn" type="button" data-retry-msg="'+escapeHTML(options.msgID)+'">重试</button>':"")+
      '</div>'
    ):"";
    item.innerHTML =
      '<div class="event-title">'+
        '<span class="event-title-main" data-status-slot>'+(options&&options.status?statusIcon(options.status):"")+pathHtml+'<span>'+escapeHTML(title)+'</span></span>'+
        '<span class="event-title-meta">'+escapeHTML(nowTime()+metaText)+'</span>'+
      '</div>'+
      '<div class="event-body">'+escapeHTML(body)+'</div>'+
      msgFooter;
    timeline.appendChild(item);
    timeline.scrollTop = timeline.scrollHeight;
    allTimelineEvents.push(item);

    // Persist to IDB
    if (dbReady) {
      writeMessage({
        type: kind, op: (options&&options.op)||0, from_mid: (options&&options.fromMid)||0,
        to_mid: (options&&options.toMid)||0, body: body, msgID: (options&&options.msgID)||"",
        status: (options&&options.status)||"", timestamp: (options&&options.timestamp)||Date.now(),
        client_name: title, meta: meta||"", pathKind: (options&&options.pathKind)||""
      });
      updateStorageSize();
    }

    return item;
  }

  function trackMessage(data) {
    var msgID = data.msgID||("local-"+Date.now()+"-"+Math.random().toString(36).slice(2,6));
    var record = Object.assign({ msgID:msgID, status:"pending", kind:"sent", op:9, title:"", body:"", timestamp:Date.now(), event:null, failTimer:null }, data);
    trackedMessages.set(msgID, record);
    traceItems.unshift(record);
    while (traceItems.length>TRACE_LIMIT) {
      var old = traceItems.pop();
      trackedMessages.delete(old.msgID);
    }
    if (record.status!=="acked") {
      record.failTimer = setTimeout(function() {
        var cur = trackedMessages.get(msgID);
        if (cur&&cur.status!=="acked") updateMessageStatus(msgID,"failed");
      }, 30000);
    }
    renderTrace();
    return record;
  }

  function renderTrackedEvent(kind, title, body, meta, data) {
    var record = trackMessage(Object.assign({kind:kind,title:title,body:body},data));
    record.event = addEvent(kind, title, body, meta, {
      trackId: record.msgID, msgID: record.msgID, status: record.status,
      fromMid: data.fromMid, toMid: data.toMid, op: data.op, pathKind: data.pathKind
    });
    return record;
  }

  function updateMessageStatus(msgID, status) {
    var record = trackedMessages.get(msgID);
    if (!record) return;
    record.status = status;
    if (status==="acked"&&record.failTimer) { clearTimeout(record.failTimer); record.failTimer=null; }
    if (record.event) {
      var slot = record.event.querySelector("[data-status-slot]");
      if (slot) {
        var text = slot.querySelector("span:last-child");
        slot.innerHTML = statusIcon(status)+(text?'<span>'+escapeHTML(text.textContent)+'</span>':"");
      }
      var footer = record.event.querySelector(".event-footer");
      if (footer) {
        var retry = footer.querySelector(".retry-btn");
        if (status==="failed"&&!retry) {
          footer.insertAdjacentHTML("beforeend",'<button class="retry-btn" type="button" data-retry-msg="'+escapeHTML(msgID)+'">重试</button>');
        } else if (status!=="failed"&&retry) {
          retry.remove();
        }
      }
    }
    if (dbReady) updateMessageInDB(msgID, status);
    renderTrace();
  }

  function renderTrace() {
    var list = $("#traceList"); if (!list) return;
    var filter = $("#traceStatusFilter")?$("#traceStatusFilter").value:"all";
    var items = traceItems.filter(function(i){return filter==="all"||i.status===filter;});

  // ============ Search & Filter ============

  function applySearchAndFilter() {
    var query = ($("#searchInput").value||"").trim().toLowerCase();
    var filterOp = $("#filterOp").value;
    var filterKind = $("#filterKind").value;
    var filterFromMid = $("#filterFromMid").value;
    var filterTime = $("#filterTime").value;
    var now = Date.now();
    var timeCutoff = 0;
    if (filterTime==="5m") timeCutoff = now-300000;
    else if (filterTime==="1h") timeCutoff = now-3600000;
    else if (filterTime==="today") timeCutoff = new Date().setHours(0,0,0,0);

    searchMatches = [];
    currentMatchIdx = -1;

    var events = $$("#timeline .event");
    var matchCount = 0;

    events.forEach(function(ev) {
      var matchesFilter = true;
      if (filterOp && ev.dataset.op!==filterOp) matchesFilter = false;
      if (filterKind && ev.dataset.kind!==filterKind && (!ev.classList.contains(filterKind))) matchesFilter = false;
      if (filterFromMid && ev.dataset.fromMid!==filterFromMid && ev.dataset.toMid!==filterFromMid) matchesFilter = false;
      if (timeCutoff && Number(ev.dataset.timestamp)<timeCutoff) matchesFilter = false;

      if (!matchesFilter) { ev.classList.add("dimmed"); return; }

      var bodyText = (ev.querySelector(".event-body")||{}).textContent||"";
      var titleText = (ev.querySelector(".event-title")||{}).textContent||"";
      var allText = bodyText+" "+titleText;

      if (query) {
        var hasMatch = allText.toLowerCase().indexOf(query)>=0;
        if (!hasMatch) { ev.classList.add("dimmed"); return; }
        // highlight
        highlightText(ev, query);
        searchMatches.push(ev);
        matchCount++;
      } else {
        clearHighlight(ev);
        matchCount++;
      }
      ev.classList.remove("dimmed");
    });

    if (query) {
      $("#matchInfo").textContent = "找到 "+matchCount+" 条匹配";
      $("#matchInfo").classList.remove("hidden");
      $("#prevMatch").disabled = false;
      $("#nextMatch").disabled = false;
      $("#clearSearch").classList.remove("hidden");
    } else {
      $("#matchInfo").textContent = "";
      $("#matchInfo").classList.add("hidden");
      $("#prevMatch").disabled = true;
      $("#nextMatch").disabled = true;
      $("#clearSearch").classList.add("hidden");
    }
    if (filterOp||filterKind||filterFromMid||filterTime) {
      $("#matchInfo").textContent = (query?"找到 "+matchCount+" 条匹配":"已筛选");
      $("#matchInfo").classList.remove("hidden");
      $("#clearSearch").classList.remove("hidden");
    }
  }

    var body = el.querySelector(".event-body");
    if (body&&query) {

      if (idx>=0) {
        body.innerHTML = escapeHTML(text.slice(0,idx))+'<mark>'+escapeHTML(text.slice(idx,idx+query.length))+'</mark>'+escapeHTML(text.slice(idx+query.length));
      }
    }
  }

  function applyViewFilter() {
    var val = $("#viewFilter").value;
    currentViewFilter = val;

    $$("#timeline .event").forEach(function(ev) {
      if (val==="all") { ev.classList.remove("hidden"); return; }
      if (val.indexOf("mid_")===0) {
        var mid = Number(val.replace("mid_",""));
        var fromMid = Number(ev.dataset.fromMid);
        var toMid = Number(ev.dataset.toMid);
        if (fromMid===mid||toMid===mid) ev.classList.remove("hidden");
        else ev.classList.add("hidden");
      }
    });

    // Reset unread for selected mid
    if (val.indexOf("mid_")===0) {
      var mid = Number(val.replace("mid_",""));
      unreadCounts[mid] = 0;
      renderClients();
    }
  }

  function incrementUnread(mid) {
    if (currentViewFilter===("mid_"+mid)) return;
    unreadCounts[mid] = (unreadCounts[mid]||0)+1;
    renderClients();
  }

  // ============ Metrics ============

  function parsePrometheus(text) {
    var metrics = {};
    var lines = text.split("\n");
    lines.forEach(function(line) {
      if (!line||line.startsWith("#")) return;
      var m = line.match(/^(\w+)\{?([^}]*)\}?\s+([\d\.e+-]+)(?:\s+(\d+))?/);
      if (m) {
        var name = m[1];
        var labels = {};
        if (m[2]) {
          m[2].split(",").forEach(function(pair){
            var kv = pair.split("=");
            if (kv.length===2) labels[kv[0]]=kv[1].replace(/^"|"$/g,"");
          });
        }
        var value = parseFloat(m[3]);
        if (!metrics[name]) metrics[name] = [];
        metrics[name].push({labels:labels,value:value,ts:m[4]?Number(m[4]):Date.now()});
      }
    });
    return metrics;
  }

  function renderMetricsCards(metrics) {
    var cards = $("#metricsCards");
    var names = { push_total:"总推送数", comet_connections:"在线连接数", msg_ack_total:"ACK确认数", push_latency:"平均延迟(ms)" };
    var html = "";
    Object.keys(names).forEach(function(key){
      var data = metrics[key];
      var val = "-";
      var deltaHtml = "";
      if (data&&data.length) {
        val = data[data.length-1].value;
        if (lastMetricValues[key]!==undefined) {
          var diff = val-lastMetricValues[key];
          if (diff>0) deltaHtml = '<span class="metric-delta up">↑ +'+diff.toFixed(0)+'</span>';
          else if (diff<0) deltaHtml = '<span class="metric-delta down">↓ '+diff.toFixed(0)+'</span>';
        }
        lastMetricValues[key] = val;
      }
      html += '<div class="metric-card"><div class="metric-value">'+val+'</div><div class="metric-label">'+names[key]+'</div>'+deltaHtml+'</div>';
    });
    cards.innerHTML = html;

    // chart
    var chartData = (metrics.comet_connections||[]).slice(-30);
    var chartEl = $("#metricsChart");
    if (chartData.length) {
      var maxVal = Math.max.apply(null, chartData.map(function(d){return d.value;}))||1;
      chartEl.innerHTML = chartData.map(function(d){
        var h = Math.max(2, Math.round(d.value/maxVal*100));
        return '<div class="bar" style="height:'+h+'%" title="'+d.value+'"></div>';
      }).join("");
    }
  }

  async function refreshMetrics() {
    try {
      var r = await fetch(apiUrl("/metrics"));
      var text = await r.text();
      var parsed = parsePrometheus(text);
      metricsHistory.push({ts:Date.now(),metrics:parsed});
      if (metricsHistory.length>30) metricsHistory.shift();
      renderMetricsCards(parsed);
    } catch(e) {
      // silently fail
    }
  }

  function startMetricsAutoRefresh() {
    stopMetricsAutoRefresh();
    if ($("#metricsAutoRefresh").checked) {
      var interval = Number($("#metricsInterval").value)||5000;
      metricsRefreshTimer = setInterval(refreshMetrics, interval);
    }
  }

  function stopMetricsAutoRefresh() {
    if (metricsRefreshTimer) { clearInterval(metricsRefreshTimer); metricsRefreshTimer=null; }
  }

  // ============ Protocol ============

  function buildProto(op, seq, body) {
    var bodyBytes = body?(body instanceof Uint8Array?body:new Uint8Array(body)):new Uint8Array();
    var buf = new ArrayBuffer(RAW_HEADER_LEN+bodyBytes.byteLength);
    var v = new DataView(buf);
    v.setInt32(0,RAW_HEADER_LEN+bodyBytes.byteLength);
    v.setInt16(4,RAW_HEADER_LEN); v.setInt16(6,1);
    v.setInt32(8,op); v.setInt32(12,seq);
    new Uint8Array(buf,RAW_HEADER_LEN).set(bodyBytes);
    return buf;
  }

  function parseProto(data) {
    var v = new DataView(data);
    var packLen = v.getInt32(0);
    var headerLen = v.getInt16(4);
    return { packLen:packLen, headerLen:headerLen, ver:v.getInt16(6), op:v.getInt32(8), seq:v.getInt32(12), body:data.slice(headerLen,packLen) };
  }

  function readUint64(view, offset) {
    var high = BigInt(view.getUint32(offset));
    var low = BigInt(view.getUint32(offset+4));
    var value = (high<<32n)+low;
    return value<=BigInt(Number.MAX_SAFE_INTEGER)?Number(value):value.toString();
  }

  function writeUint64(view, offset, value) {
    var text = String(value===undefined||value===null||value===""?"0":value).trim();
    var big = BigInt(text||"0");
    view.setUint32(offset, Number((big>>32n)&0xffffffffn));
    view.setUint32(offset+4, Number(big&0xffffffffn));
  }

  function parseMsgBody(buffer) {
    if (!buffer||buffer.byteLength<34) throw new Error("too short");
    var view = new DataView(buffer);
    var msgIDLen = view.getUint16(0);
    var minLen = 2+msgIDLen+32;
    if (msgIDLen>2048||buffer.byteLength<minLen) throw new Error("not MsgBody");
    var offset = 2;
    var msgID = textDecoder.decode(buffer.slice(offset,offset+msgIDLen));
    offset+=msgIDLen;
    var from = readUint64(view,offset); offset+=8;
    var to = readUint64(view,offset); offset+=8;
    var timestamp = readUint64(view,offset); offset+=8;
    var seq = readUint64(view,offset); offset+=8;
    var content = buffer.slice(offset);
    var contentText = textDecoder.decode(content);
    return { msgID:msgID, from:from, to:to, timestamp:timestamp, seq:seq, content:content, contentText:contentText };
  }

  function parseAckBody(buffer) {
    var view = new DataView(buffer);
    var msgIDLen = view.getUint16(0);
    var msgID = textDecoder.decode(buffer.slice(2,2+msgIDLen));
    var seq = readUint64(view,2+msgIDLen);
    return { msgID:msgID, seq:seq };
  }

  function marshalAckBody(msgID, seq) {
    var idBytes = textEncoder.encode(msgID);
    var buf = new ArrayBuffer(2+idBytes.byteLength+8);
    var view = new DataView(buf);
    view.setUint16(0,idBytes.byteLength);
    new Uint8Array(buf,2).set(idBytes);
    writeUint64(view,2+idBytes.byteLength,seq);
    return new Uint8Array(buf);
  }

  function marshalSyncReq(lastSeq, limit) {
    var buf = new ArrayBuffer(12);
    var view = new DataView(buf);
    writeUint64(view,0,lastSeq);
    view.setUint32(8,Number(limit||100));
    return new Uint8Array(buf);
  }

  function parseSyncReply(buffer) {
    if (!buffer||buffer.byteLength<13) throw new Error("sync reply too short");
    var view = new DataView(buffer);
    var reply = { currentSeq:readUint64(view,0), hasMore:view.getUint8(8)===1, messages:[] };
    var count = view.getUint32(9);
    var offset = 13;
    for (var i=0;i<count;i+=1) {
      if (offset+4>buffer.byteLength) throw new Error("sync message length truncated");
      var msgLen = view.getUint32(offset); offset+=4;
      if (offset+msgLen>buffer.byteLength) throw new Error("sync message body truncated");
      reply.messages.push(parseMsgBody(buffer.slice(offset,offset+msgLen)));
      offset+=msgLen;
    }
    return reply;
  }

  function decodePayload(buffer) {
    var text = textDecoder.decode(buffer);
    var json = null;
    try { json = JSON.parse(text); } catch(e) { json=null; }
    var msgBody = null;
    try { msgBody = parseMsgBody(buffer); } catch(e) { msgBody=null; }
    var msgJson = null;
    if (msgBody) { try { msgJson=JSON.parse(msgBody.contentText); } catch(e) { msgJson=null; } }
    return { text:text, json:json, msgBody:msgBody, msgJson:msgJson };
  }

  function payloadText(decoded) {
    if (decoded.msgJson&&decoded.msgJson.text) return decoded.msgJson.text;
    if (decoded.json&&decoded.json.text) return decoded.json.text;
    if (decoded.msgBody) return decoded.msgBody.contentText||"[binary MsgBody]";
    return decoded.text||"[empty]";
  }

  function payloadMeta(decoded) {
    var data = decoded.msgJson||decoded.json||{};
    if (decoded.msgBody) return "msg_id="+decoded.msgBody.msgID+" seq="+decoded.msgBody.seq;
    var parts = [];
    if (data.from) parts.push("from="+data.from);
    if (data.to) parts.push("to="+data.to);
    return parts.join(" ");
  }

  function sendProtocol(client, op, body, label) {
    if (!client.ws||client.ws.readyState!==WebSocket.OPEN) throw new Error(client.name+" 未连接");
    client.ws.send(buildProto(op, client.seq++, body||null));
    if (label) addEvent("system", client.name, label, "op="+op,{op:op,fromMid:client.mid});
  }

  function clearReconnectTimer(client) {
    if (client.reconnectTimer) { clearTimeout(client.reconnectTimer); client.reconnectTimer=null; }
  }

  function shouldAutoReconnect(client) {
    return $("#autoReconnect").checked&&!client.manualClose&&!unloading&&client.reconnectAttempts<maxReconnectAttempts();
  }

  function scheduleReconnect(client) {
    clearClientTimer(client);
    clearReconnectTimer(client);
    if (!shouldAutoReconnect(client)) { client.status="disconnected"; renderClients(); return; }
    client.reconnectAttempts+=1;
    client.status="reconnecting";
    var delay = Math.min(client.reconnectDelay||1000,30000);
    client.reconnectDelay = Math.min(delay*2,30000);
    renderClients();
    addEvent("system", client.name, "将在 "+Math.round(delay/1000)+"s 后重连", "attempt="+client.reconnectAttempts+"/"+maxReconnectAttempts(),{op:0,fromMid:client.mid});
    client.reconnectTimer = setTimeout(function(){connectClient(client.id,true);},delay);
  }

  function connectClient(id, isReconnect) {
    var client = getClient(id);
    if (!client||client.status==="connected"||client.status==="connecting") return;
    clearReconnectTimer(client);
    client.manualClose = false;
    var ws = new WebSocket(getWsUrl());
    client.ws = ws;
    client.status = isReconnect?"reconnecting":"connecting";
    client.room = $("#defaultRoom").value.trim()||client.room;
    ws.binaryType = "arraybuffer";
    renderClients();

    ws.onopen = function() {
      var token = { mid:client.mid, key:client.key, room_id:client.room, platform:client.platform, device_id:client.deviceId, accepts:getDefaultAccepts(), last_seq:client.lastSeq||0 };
      sendProtocol(client, OP_AUTH, textEncoder.encode(JSON.stringify(token)), "Auth "+JSON.stringify(token));
    };

    ws.onmessage = function(evt) {
      var proto;
      try { proto = parseProto(evt.data); }
      catch(e) { addEvent("error", client.name, "协议解析失败: "+e.message, "",{op:0,fromMid:client.mid}); return; }
      handleProto(client, proto);
    };

    ws.onerror = function() {
      addEvent("error", client.name, "WebSocket error", "",{op:0,fromMid:client.mid});
    };

    ws.onclose = function() {
      clearClientTimer(client);
      client.ws = null;
      addEvent("system", client.name, "连接已断开","",{op:0,fromMid:client.mid});
      scheduleReconnect(client);
    };
  }

  function clearClientTimer(client) {
    if (client.heartbeatTimer) { clearInterval(client.heartbeatTimer); client.heartbeatTimer=null; }
  }

  function disconnectClient(id, silent) {
    var client = getClient(id); if (!client) return;
    client.manualClose = true;
    clearClientTimer(client);
    clearReconnectTimer(client);
    if (client.ws) { client.ws.close(); client.ws=null; }
    client.status = "disconnected";
    client.reconnectAttempts = 0;
    client.reconnectDelay = 1000;
    renderClients();
    if (!silent) addEvent("system", client.name, "已手动断开","",{op:0,fromMid:client.mid});
  }

  function startHeartbeat(client) {
    clearClientTimer(client);
    var seconds = Math.max(10,Number($("#heartbeatSeconds").value)||30);
    client.heartbeatTimer = setInterval(function() {
      try { sendProtocol(client, OP_HEARTBEAT, null); }
      catch(e) { addEvent("error", client.name, "心跳失败: "+e.message,"",{op:2,fromMid:client.mid}); }
    }, seconds*1000);
  }

  function handleProto(client, proto) {
    var name = opNames[proto.op]||("Op "+proto.op);
    switch (proto.op) {
      case OP_AUTH_REPLY:
        client.status = "connected";
        client.reconnectAttempts = 0;
        client.reconnectDelay = 1000;
        $("#apiStatus").textContent = getApiBase().replace(/^https?:\/\//,"");
        $("#roomStatus").textContent = client.room;
        startHeartbeat(client);
        renderClients();
        addEvent("system", client.name, "Auth OK", "op=8",{op:8,fromMid:client.mid});
        break;
      case OP_HEARTBEAT_REPLY: {
        var online = "-";
        if (proto.body.byteLength>=4) online = new DataView(proto.body).getInt32(0);
        client.online = online;
        renderClients();
        addEvent("system", client.name, "HeartbeatReply online="+online, "op=3",{op:3,fromMid:client.mid});
        break;
      }
      case OP_RAW:
        handleIncomingPayload(client, proto, name);
        break;
      case OP_SYNC_REPLY:
        handleSyncReply(client, proto.body, "WS SyncReply");
        break;
      case OP_CHANGE_ROOM_REPLY:
      case OP_SUB_REPLY:
      case OP_UNSUB_REPLY:
        addEvent("system", client.name, name+" OK", "op="+proto.op,{op:proto.op,fromMid:client.mid});
        break;
      case OP_SEND_MSG_ACK: {
        var ackBody;
        try { ackBody = parseAckBody(proto.body); }
        catch(e) { addEvent("error", client.name, "SendMsgAck 解析失败","",{op:18,fromMid:client.mid}); break; }
        updateMessageStatus(ackBody.msgID, "delivered");
        addEvent("system", client.name, "SendMsgAck msg_id="+ackBody.msgID, "op=18",{op:18,fromMid:client.mid});
        break;
      }
      case OP_PUSH_MSG_ACK: {
        var pushAckBody;
        try { pushAckBody = parseAckBody(proto.body); }
        catch(e) { addEvent("error", client.name, "PushMsgAck 解析失败","",{op:19,fromMid:client.mid}); break; }
        updateMessageStatus(pushAckBody.msgID, "acked");
        addEvent("system", client.name, "PushMsgAck msg_id="+pushAckBody.msgID, "op=19",{op:19,fromMid:client.mid});
        break;
      }
      default:
        handleIncomingPayload(client, proto, name);
        break;
    }
  }

  function handleIncomingPayload(client, proto, title) {
    var decoded = decodePayload(proto.body);
    var body = payloadText(decoded);
    var meta = payloadMeta(decoded)||("op="+proto.op+" len="+proto.body.byteLength);
    var msgID = decoded.msgBody?decoded.msgBody.msgID:null;
    var fromMid = decoded.msgBody?decoded.msgBody.from:(decoded.json?decoded.json.from:client.mid);
    var toMid = decoded.msgBody?decoded.msgBody.to:(decoded.json?decoded.json.to:0);

    // Determine path kind
    var pathKind = (proto.op===OP_RAW||proto.op===OP_SYNC_REPLY)?"reliable":"direct";
    recordPath(pathKind);

    // Determine if this is a push (received) message for notification
    var isReceived = (decoded.msgBody&&decoded.msgBody.from!==client.mid)||(decoded.json&&decoded.json.from!==client.mid);

    addEvent("received", client.name+" 收到 "+title, body, meta, {
      op:proto.op, fromMid:fromMid, toMid:toMid, msgID:msgID, pathKind:pathKind, timestamp:Date.now()
    });

    if (isReceived) {
      incrementUnread(fromMid);
      maybeShowNewMsgFloat();
      var senderName = clients.find(function(c){return c.mid===fromMid;});
      var notifTitle = (senderName?senderName.name:"mid="+fromMid)+" 发来消息";
      showNotification(notifTitle, body, msgID);
    }

    if ($("#autoAck").checked&&decoded.msgBody&&decoded.msgBody.msgID) {
      try { sendAck(client, decoded.msgBody.msgID, decoded.msgBody.seq); }
      catch(e) { addEvent("error", client.name, "ACK 失败: "+e.message,"",{op:0,fromMid:client.mid}); }
    }
  }

  function handleSyncReply(client, buffer, title) {
    var reply;
    try { reply = parseSyncReply(buffer); }
    catch(e) { addEvent("error", title, "SyncReply 解析失败: "+e.message); return null; }
    if (client) { client.lastSeq = reply.currentSeq; renderClients(); }
    var totalMsgs = reply.messages.length;

    if (totalMsgs>0) {
      var index = 0;
      function processNext() {
        if (index>=totalMsgs) { hideSyncProgress(totalMsgs); return; }
        showSyncProgress(index+1, totalMsgs);
        var message = reply.messages[index];
        var text = message.contentText;
        try { var j = JSON.parse(message.contentText); text = j.text||JSON.stringify(j); } catch(e){text=message.contentText;}
        recordPath("reliable");
        addEvent("received", (client?client.name:title)+" 离线消息", text, "msg_id="+message.msgID+" seq="+message.seq, {
          op:OP_SYNC_REPLY, fromMid:message.from, toMid:message.to, msgID:message.msgID, pathKind:"reliable", timestamp:Date.now()
        });
        if (client&&message.from!==client.mid) {
          incrementUnread(message.from);
          maybeShowNewMsgFloat();
        }
        if (client&&$("#autoAck").checked&&message.msgID) {
          try { sendAck(client, message.msgID, message.seq); } catch(e) {}
        }
        index++;
        setTimeout(processNext, 50);
      }
      processNext();
    }
    var owner = client?client.name:title;
    addEvent("system", owner, "current_seq="+reply.currentSeq+" has_more="+reply.hasMore+" messages="+totalMsgs, "",{op:21,fromMid:client?client.mid:0});
    return reply;
  }

  function sendAck(client, msgID, seq) {
    sendProtocol(client, OP_PUSH_MSG_ACK, marshalAckBody(msgID, seq), "ACK msg_id="+msgID+" seq="+seq);
  }

  function normalizeRoom(value) {
    var raw = String(value||"").trim();
    if (raw.includes("://")) {
      var parts = raw.split("://");
      return { type:parts[0]||"live", room:parts.slice(1).join("://") };
    }
    return { type:$("#pushRoomType").value.trim()||"live", room:raw||"1000" };
  }

  async function sendPush(endpoint, operation, target, body, options) {
    var params = new URLSearchParams();
    params.set("operation", operation);
    if (endpoint==="mids") { appendList(params,"mids",csvValues(target)); return assertResult(await postRaw("/goim/push/mids",params,body)); }
    if (endpoint==="keys") { appendList(params,"keys",csvValues(target)); return assertResult(await postRaw("/goim/push/keys",params,body)); }
    if (endpoint==="room") { var room=normalizeRoom(target); params.set("type",room.type); params.set("room",room.room); return assertResult(await postRaw("/goim/push/room",params,body)); }
    if (endpoint==="all") { if (options&&options.speed) params.set("speed",options.speed); return assertResult(await postRaw("/goim/push/all",params,body)); }
    throw new Error("unknown push endpoint");
  }

  async function refreshOnlineTotal() {
    var result = assertResult(await fetchJSON("/goim/online/total"));
    var data = result.data||{};
    $("#connStatus").textContent = "conn "+(data.conn_count||"-")+" / ip "+(data.ip_count||"-");
    setResult(result);
    return result;
  }

  function defaultPayload(fromClient, text, targetMode, targetValue) {
    var firstTarget = csvValues(targetValue)[0]||"";
    var to = targetMode==="mids"&&firstTarget?Number(firstTarget):0;
    return { from:fromClient.mid, to:Number.isFinite(to)?to:0, text:text, ts:Date.now() };
  }

  function saveConfig() {
    var config = {
      apiHost:$("#apiHost").value, wsHost:$("#wsHost").value,
      defaultRoom:$("#defaultRoom").value, defaultAccepts:$("#defaultAccepts").value,
      heartbeatSeconds:$("#heartbeatSeconds").value, maxReconnectAttempts:$("#maxReconnectAttempts").value,
      autoAck:$("#autoAck").checked, autoConnect:$("#autoConnect").checked,
      autoReconnect:$("#autoReconnect").checked,
      desktopNotify:$("#desktopNotify").checked, soundNotify:$("#soundNotify").checked
    };
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    addEvent("system","配置","已保存当前前端配置");
  }

  function loadConfig() {
    try {
      var config = JSON.parse(localStorage.getItem(CONFIG_KEY)||"{}");
      Object.keys(config).forEach(function(key){
        var el = $("#"+key); if (!el) return;
        if (el.type==="checkbox") el.checked = Boolean(config[key]);
        else el.value = config[key];
      });
    } catch(e) { addEvent("error","配置","读取 localStorage 失败: "+e.message); }
  }

  // ============ Restore timeline from IDB ============

  async function restoreTimeline() {
    loadedCount = 0;
    var msgs = await loadRecentMessages(PAGE_SIZE);
    if (!msgs.length) {
      $("#loadMoreBtn").classList.add("hidden");
      return;
    }
    msgs.forEach(function(m) {
      var item = addEvent(m.type||"system", m.client_name||"", m.body||"", m.meta||"", {
